<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABDULMALIQUE - Chess 🔥</title>
    <!-- Firebase SDKs - FREE cloud database -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="app">
        <div class="menu-btn" id="menuBtn">☰</div>

        <div class="offcanvas" id="offcanvas">
            <div style="text-align: right; margin-bottom: 20px;">
                <button id="closeMenuBtn"
                    style="background: none; font-size: 24px; padding: 5px; color: white; cursor: pointer;">✕</button>
            </div>

            <div class="turn-indicator-offcanvas">
                <span style="font-size: 28px;" id="offcanvasTurnPiece">♔</span>
                <span id="offcanvasTurnText">White's Turn</span>
            </div>

            <div class="offcanvas-section">
                <div class="offcanvas-title">🌐 ONLINE MULTIPLAYER - FIREBASE</div>
                <button class="offcanvas-btn" id="createGameBtn">🎮 CREATE GAME</button>
                <div id="gameCodeContainer" style="display: none;">
                    <div id="roomCodeDisplay" class="room-code-display"></div>
                    <button class="offcanvas-btn copy-btn" id="copyCodeBtn">📋 COPY CODE</button>
                </div>
                <input type="text" id="roomCodeInput" placeholder="Enter Game Code" class="offcanvas-input"
                    maxlength="8">
                <button class="offcanvas-btn" id="joinGameBtn">🔗 JOIN GAME</button>
                <button class="offcanvas-btn" id="disconnectBtn" style="background: #d32f2f;">🚪 LEAVE GAME</button>
                <div id="onlineStatus" class="connection-badge">⚫ Not connected</div>
            </div>

            <div class="offcanvas-section">
                <div class="offcanvas-title">🎮 GAME MODES</div>
                <button class="offcanvas-btn" id="offcanvasModeAI">🤖 VS COMPUTER</button>
                <button class="offcanvas-btn" id="offcanvasModeFriend">👥 LOCAL 2P</button>
            </div>

            <div class="offcanvas-section">
                <div class="offcanvas-title">⚙️ AI DIFFICULTY</div>
                <button class="offcanvas-btn" id="offcanvasEasy">🟢 EASY</button>
                <button class="offcanvas-btn" id="offcanvasMedium">🟡 MEDIUM</button>
                <button class="offcanvas-btn active" id="offcanvasHard">🔴 HARD</button>
            </div>

            <div class="offcanvas-section">
                <button class="offcanvas-btn" id="offcanvasReset" style="background: #ff9800;">🔄 NEW GAME</button>
            </div>
        </div>

        <div class="main-content">
            <div class="game-wrapper">
                <div class="game-container">
                    <div class="board-container">
                        <div class="board" id="chessboard"></div>
                    </div>
                    <div class="status" id="statusMsg">🎮 Click menu to play online!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="promotionModal" class="modal">
        <div class="modal-content">
            <h2>✨ Choose Promotion Piece ✨</h2>
            <div class="promotion-pieces">
                <div class="promo-piece" data-piece="q">♕<span>Queen</span></div>
                <div class="promo-piece" data-piece="r">♖<span>Rook</span></div>
                <div class="promo-piece" data-piece="b">♗<span>Bishop</span></div>
                <div class="promo-piece" data-piece="n">♘<span>Knight</span></div>
            </div>
        </div>
    </div>
    <script src="script.JS"></script>
    <script>

    </script>
</body>

</html>
