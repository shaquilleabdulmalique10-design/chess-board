<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABDULMALIQUE - CHESS</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <button class="menu-btn" id="menuBtn">☰</button>

        <div class="offcanvas" id="offcanvas">
            <div class="sidebar-header">
                <h1>♜ CHESS MASTER</h1>
                <p>Play with friends anywhere</p>
            </div>

            <div class="turn-card">
                <div class="turn-icon" id="sidebarTurnIcon">♔</div>
                <div class="turn-info">
                    <div class="turn-label">CURRENT TURN</div>
                    <div class="turn-value" id="sidebarTurnText">White's Turn</div>
                </div>
            </div>

            <!-- Online Section -->
            <div class="section-title">
                🌐 ONLINE MULTIPLAYER
            </div>
            <button class="btn btn-primary" id="createGameBtn">🎮 CREATE NEW GAME</button>
            <div id="gameCodeContainer" style="display: none;">
                <div class="room-code-box" id="roomCodeDisplay"></div>
                <button class="btn btn-success" id="copyCodeBtn">📋 COPY GAME CODE</button>
            </div>
            <input type="text" id="roomCodeInput" placeholder="Enter Game Code" class="input-field" maxlength="8">
            <button class="btn btn-primary" id="joinGameBtn">🔗 JOIN GAME</button>
            <button class="btn btn-danger" id="disconnectBtn">🚪 LEAVE GAME</button>
            <div id="onlineStatus" class="status-badge">⚫ Not connected</div>

            <!-- Game Modes -->
            <div class="section-title">
                🎮 GAME MODES
            </div>
            <button class="btn" id="offcanvasModeAI">🤖 VS COMPUTER</button>
            <button class="btn" id="offcanvasModeFriend">👥 LOCAL TWO PLAYER</button>

            <!-- AI Difficulty -->
            <div class="section-title">
                ⚙️ AI DIFFICULTY
            </div>
            <div class="difficulty-buttons">
                <button class="btn" id="offcanvasEasy">🟢 EASY</button>
                <button class="btn" id="offcanvasMedium">🟡 MEDIUM</button>
                <button class="btn active" id="offcanvasHard">🔴 HARD</button>
            </div>

            <!-- Reset -->
            <div class="section-title">
                ⚡ GAME CONTROLS
            </div>
            <button class="btn btn-warning" id="offcanvasReset">🔄 RESET GAME</button>
        </div>

        <div class="main-content">
            <div class="game-wrapper">
                <div class="game-container">
                    <div class="board-container">
                        <div class="board" id="chessboard"></div>
                    </div>
                    <div class="status-text" id="statusMsg">✨ Click menu to start playing! ✨</div>
                </div>
            </div>
        </div>
    </div>

    <div id="promotionModal" class="modal">
        <div class="modal-content">
            <h2>✨ Choose Your Piece ✨</h2>
            <div class="promotion-pieces">
                <div class="promo-piece" data-piece="q">♕<span>QUEEN</span></div>
                <div class="promo-piece" data-piece="r">♖<span>ROOK</span></div>
                <div class="promo-piece" data-piece="b">♗<span>BISHOP</span></div>
                <div class="promo-piece" data-piece="n">♘<span>KNIGHT</span></div>
            </div>
        </div>
    </div>
    <script src="script.JS"></script>

</body>

</html>
